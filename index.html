<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050816" />
    <meta name="description" content="Galactica Mini - a tiny arcade space shooter." />
    <title>Galactica Mini</title>
  </head>
  <body>
    <canvas id="game" aria-label="Galactica Mini game canvas"></canvas>
    <div id="ui" class="ui">
      <div class="hud">
        <div>Score <strong id="score">0</strong></div>
        <div>Best <strong id="best">0</strong></div>
        <div>Lives <strong id="lives">3</strong></div>
      </div>
      <section id="panel" class="panel">
        <p class="eyebrow">Tiny space shooter</p>
        <h1>Galactica Mini</h1>
        <p id="panelText">Drag to move. Auto-fire lasers. Survive the cosmic rush.</p>
        <button id="primaryButton" type="button">Play</button>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
